<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Info</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1f2e;
      --surface2: #222840;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --text: #e2e8f0;
      --muted: #64748b;
      --heading: #f1f5f9;
      --cyan: #22d3ee;
      --cyan-dim: rgba(34,211,238,0.12);
      --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12);
      --amber: #fbbf24;
      --amber-dim: rgba(251,191,36,0.12);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.12);
      --grey: #94a3b8;
      --grey-dim: rgba(148,163,184,0.12);
      --radius: 10px;
      --radius-sm: 6px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 40px; object-fit: contain; }
    .header-title { font-size: 17px; font-weight: 700; color: var(--heading); letter-spacing: -0.2px; }
    .header-sub { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* ── SEARCH BAR ── */
    .search-bar {
      padding: 1.25rem 2rem 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 420px;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 12px 9px 38px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--cyan); }
    .search-input::placeholder { color: var(--muted); }
    .count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      white-space: nowrap;
    }

    /* ── STORE GRID ── */
    .store-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      padding: 1.25rem 2rem 2rem;
    }

    .store-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .store-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--card-accent, var(--cyan));
      opacity: 0.7;
    }
    .store-card:hover {
      border-color: var(--border-hover);
      background: var(--surface2);
      transform: translateY(-1px);
    }
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-code {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--heading);
      margin-bottom: 2px;
      line-height: 1.3;
    }
    .card-display {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .meta-pill {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-family: 'DM Mono', monospace;
      background: var(--grey-dim);
      color: var(--grey);
    }
    .status-pill {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
    }
    .status-live    { background: var(--green-dim); color: var(--green); }
    .status-receiving { background: var(--amber-dim); color: var(--amber); }
    .status-construction { background: var(--cyan-dim); color: var(--cyan); }
    .status-closed  { background: var(--red-dim); color: var(--red); }
    .status-default { background: var(--grey-dim); color: var(--grey); }

    .pharmacy-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: rgba(167,139,250,0.12);
      color: #a78bfa;
      font-family: 'DM Mono', monospace;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      display: none;
    }
    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 14px; }

    /* ── LOADING ── */
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.18s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 20px 24px 0;
      margin-bottom: 20px;
    }
    .modal-code {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .modal-name { font-size: 20px; font-weight: 700; color: var(--heading); }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .modal-close:hover { color: var(--text); background: var(--surface2); }

    .modal-body { padding: 0 24px 24px; }

    .modal-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin: 20px 0 10px;
    }
    .modal-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .modal-field { display: flex; flex-direction: column; gap: 4px; }
    .modal-field.full { grid-column: 1 / -1; }
    .field-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    .field-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }
    .field-link {
      font-size: 13px;
      color: var(--cyan);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .field-link:hover { text-decoration: underline; }

    /* edit mode */
    .field-input, .field-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 7px 10px;
      outline: none;
      width: 100%;
      transition: border-color 0.15s;
    }
    .field-input:focus, .field-select:focus { border-color: var(--cyan); }
    .field-select option { background: var(--surface2); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .btn {
      padding: 9px 20px;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--cyan); color: #0f1117; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--border-hover); }
    .btn-edit { background: var(--surface2); color: var(--cyan); border: 1px solid rgba(34,211,238,0.3); margin-left: auto; }
    .btn-edit:hover { background: var(--cyan-dim); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .toast-dot.error { background: var(--red); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <!-- Replace src with your logo URL -->
      <img class="header-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Amazon_logo.svg/1200px-Amazon_logo.svg.png" alt="Logo" onerror="this.style.display='none'" />
      <div>
        <div class="header-title">Store Info</div>
        <div class="header-sub">Store directory & details</div>
      </div>
    </div>
  </header>

  <!-- SEARCH -->
  <div class="search-bar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input class="search-input" id="search" type="text" placeholder="Search by name, code, city, district…" oninput="filterStores()" />
    </div>
    <div class="count-badge" id="count-badge">— stores</div>
  </div>

  <!-- STORE GRID -->
  <div class="store-grid" id="store-grid">
    <div class="loading-state" style="grid-column:1/-1">
      <div class="spinner"></div>
      <p>Loading stores…</p>
    </div>
  </div>
  <div class="empty-state" id="empty-state">
    <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
    </svg>
    <p>No stores match your search.</p>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div>
          <div class="modal-code" id="modal-code"></div>
          <div class="modal-name" id="modal-name"></div>
        </div>
        <button class="modal-close" onclick="closeModal()">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <div class="toast-dot" id="toast-dot"></div>
    <span id="toast-msg"></span>
  </div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ4DlhFv-RHsGhvEHT6766aCprbrWn8shmOLRZTaKqOtdhHUERfV01Ih3sG29hj0M/exec';

  // ─── STATE ────────────────────────────────────────────────────────
  let allStores = [];
  let currentStore = null;
  let editMode = false;

  // ─── STATUS HELPERS ───────────────────────────────────────────────
  function statusClass(status) {
    if (!status) return 'status-default';
    const s = status.toLowerCase();
    if (s.includes('live'))         return 'status-live';
    if (s.includes('receiv'))       return 'status-receiving';
    if (s.includes('construct'))    return 'status-construction';
    if (s.includes('closed'))       return 'status-closed';
    return 'status-default';
  }
  function accentColor(status) {
    if (!status) return 'var(--grey)';
    const s = status.toLowerCase();
    if (s.includes('live'))         return 'var(--green)';
    if (s.includes('receiv'))       return 'var(--amber)';
    if (s.includes('construct'))    return 'var(--cyan)';
    if (s.includes('closed'))       return 'var(--red)';
    return 'var(--grey)';
  }

  // ─── FETCH STORES ─────────────────────────────────────────────────
  async function fetchStores() {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=getStores`);
      const data = await res.json();
      allStores = data;
      renderGrid(allStores);
    } catch (e) {
      document.getElementById('store-grid').innerHTML =
        `<div class="loading-state" style="grid-column:1/-1;color:var(--red)">
          <p>Failed to load data. Check your Apps Script URL.</p>
        </div>`;
    }
  }

  // ─── RENDER GRID ──────────────────────────────────────────────────
  function renderGrid(stores) {
    const grid = document.getElementById('store-grid');
    const empty = document.getElementById('empty-state');
    const badge = document.getElementById('count-badge');

    badge.textContent = `${stores.length} store${stores.length !== 1 ? 's' : ''}`;

    if (stores.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = stores.map((s, i) => `
      <div class="store-card" style="--card-accent:${accentColor(s['Store Status'])}" onclick="openModal(${allStores.indexOf(s)})">
        <div class="card-top">
          <div>
            <div class="card-code">${s['Store Code'] || '—'}</div>
            <div class="card-name">${s['Name'] || '—'}</div>
            <div class="card-display">${s['Display Name'] || ''}</div>
          </div>
          <span class="status-pill ${statusClass(s['Store Status'])}">${s['Store Status'] || 'Unknown'}</span>
        </div>
        <div class="card-meta">
          ${s['City'] ? `<span class="meta-pill">📍 ${s['City']}</span>` : ''}
          ${s['District'] ? `<span class="meta-pill">${s['District']}</span>` : ''}
          ${s['Store Class'] ? `<span class="meta-pill">${s['Store Class']}</span>` : ''}
          ${s['Pharmacy'] && s['Pharmacy'].toString().toLowerCase() === 'yes' ? `<span class="pharmacy-badge">💊 Pharmacy</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ─── FILTER ───────────────────────────────────────────────────────
  function filterStores() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    if (!q) { renderGrid(allStores); return; }
    const filtered = allStores.filter(s =>
      Object.values(s).some(v => v && v.toString().toLowerCase().includes(q))
    );
    renderGrid(filtered);
  }

  // ─── MODAL ────────────────────────────────────────────────────────
  function openModal(idx) {
    currentStore = allStores[idx];
    editMode = false;
    renderModal();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    currentStore = null;
    editMode = false;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function renderModal() {
    const s = currentStore;
    document.getElementById('modal-code').textContent = s['Store Code'] || '';
    document.getElementById('modal-name').textContent = s['Name'] || 'Store Details';

    const statusOptions = ['Live', 'Receiving', 'Under Construction', 'Closed'];
    const layoutOptions = ['Final', 'Draft', 'Pending', 'N/A'];
    const classOptions  = ['A', 'B', 'C', 'D'];

    const field = (label, key, type = 'text', options = []) => {
      const val = s[key] || '';
      if (editMode) {
        if (options.length) {
          return `<div class="modal-field">
            <span class="field-label">${label}</span>
            <select class="field-select" data-key="${key}">
              ${options.map(o => `<option value="${o}" ${o === val ? 'selected' : ''}>${o}</option>`).join('')}
            </select>
          </div>`;
        }
        return `<div class="modal-field">
          <span class="field-label">${label}</span>
          <input class="field-input" type="${type}" data-key="${key}" value="${val}" />
        </div>`;
      }
      if (type === 'url' && val) {
        return `<div class="modal-field">
          <span class="field-label">${label}</span>
          <a class="field-link" href="${val}" target="_blank">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open PDF
          </a>
        </div>`;
      }
      return `<div class="modal-field">
        <span class="field-label">${label}</span>
        <span class="field-value">${val || '—'}</span>
      </div>`;
    };

    const fullField = (label, key, type = 'text') => {
      const val = s[key] || '';
      if (editMode) {
        return `<div class="modal-field full">
          <span class="field-label">${label}</span>
          <input class="field-input" type="${type}" data-key="${key}" value="${val}" />
        </div>`;
      }
      if (type === 'url' && val) {
        return `<div class="modal-field full">
          <span class="field-label">${label}</span>
          <a class="field-link" href="${val}" target="_blank">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            ${val}
          </a>
        </div>`;
      }
      return `<div class="modal-field full">
        <span class="field-label">${label}</span>
        <span class="field-value">${val || '—'}</span>
      </div>`;
    };

    document.getElementById('modal-body').innerHTML = `
      <div class="modal-section-title">General</div>
      <div class="modal-fields">
        ${field('Store Status', 'Store Status', 'text', statusOptions)}
        ${field('Store Class', 'Store Class', 'text', classOptions)}
        ${field('City', 'City')}
        ${field('District', 'District')}
        ${field('Pharmacy', 'Pharmacy', 'text', ['Yes', 'No'])}
        ${field('Opening Date', 'Opening Date', 'date')}
      </div>

      <div class="modal-section-title">Areas (m²)</div>
      <div class="modal-fields">
        ${field('Ground Floor Area', 'Ground Floor Area', 'number')}
        ${field('Mezzanine Area', 'Mezannine Area', 'number')}
      </div>

      <div class="modal-section-title">Layout & Links</div>
      <div class="modal-fields">
        ${field('Layout Status', 'Layout Status', 'text', layoutOptions)}
        ${fullField('PDF Link', 'PDF Link', 'url')}
        ${fullField('Location', 'Location', 'url')}
      </div>

      <div class="modal-actions">
        ${editMode
          ? `<button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>
             <button class="btn btn-primary" id="save-btn" onclick="saveStore()">Save changes</button>`
          : `<button class="btn btn-ghost" onclick="closeModal()">Close</button>
             <button class="btn btn-edit" onclick="enableEdit()">Edit store</button>`
        }
      </div>
    `;
  }

  function enableEdit() {
    editMode = true;
    renderModal();
  }

  function cancelEdit() {
    editMode = false;
    renderModal();
  }

  function getEditedValues() {
    const inputs = document.querySelectorAll('#modal-body [data-key]');
    const updated = { ...currentStore };
    inputs.forEach(el => { updated[el.dataset.key] = el.value; });
    return updated;
  }

  async function saveStore() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const updated = getEditedValues();

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'updateStore', data: updated })
      });
      const result = await res.json();
      if (result.success) {
        // update local state
        const idx = allStores.findIndex(s => s['Store Code'] === currentStore['Store Code']);
        if (idx !== -1) allStores[idx] = updated;
        currentStore = updated;
        editMode = false;
        renderModal();
        renderGrid(allStores);
        showToast('Changes saved', false);
      } else {
        throw new Error(result.error || 'Unknown error');
      }
    } catch (e) {
      showToast('Save failed: ' + e.message, true);
      btn.disabled = false;
      btn.textContent = 'Save changes';
    }
  }

  // ─── TOAST ────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    const dot   = document.getElementById('toast-dot');
    document.getElementById('toast-msg').textContent = msg;
    dot.className = 'toast-dot' + (isError ? ' error' : '');
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ─── INIT ─────────────────────────────────────────────────────────
  fetchStores();
</script>
</body>
</html>
